name: Desktop builds (Windows / Linux / macOS)

# Manual trigger (Actions tab -> Run workflow), on pushes to master (to iterate
# on the desktop builds), and on version tags like v1.0.0 (which also publish a
# GitHub Release with all three installers attached).
on:
  workflow_dispatch:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
    tags: ['v*']

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

env:
  # CI runners ship CMake 4.x, which hard-errors on dependencies that still
  # declare `cmake_minimum_required(VERSION < 3.5)` (e.g. firebase_cpp_sdk).
  # CMake 3.31+ honours this env var to keep those configuring. (Was only a
  # warning locally on CMake 3.x.)
  CMAKE_POLICY_VERSION_MINIMUM: '3.5'

jobs:
  # ---------------------------------------------------------------- Windows ----
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Ensure NuGet (flutter_inappwebview_windows fetches WebView2 with it)
        uses: NuGet/setup-nuget@v2
      - name: Create .env (from secret, or empty placeholder)
        shell: bash
        run: printf '%s' "${{ secrets.DOTENV }}" > .env
      - run: flutter --version
      - run: flutter pub get
      - run: flutter build windows --release

      - name: Build installer (Inno Setup)
        run: |
          choco install innosetup --no-progress -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "windows\installer\Sozo.iss"
      - name: Also zip the raw build (portable)
        shell: pwsh
        run: |
          Compress-Archive -Path "build\windows\x64\runner\Release\*" `
            -DestinationPath "build\installer\Sozo-Windows-portable.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: Sozo-Windows
          path: |
            build/installer/Sozo-Setup.exe
            build/installer/Sozo-Windows-portable.zip
          if-no-files-found: error

  # ------------------------------------------------------------------ Linux ----
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install Linux desktop + plugin system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libmpv-dev mpv \
            libsecret-1-dev libjsoncpp-dev libsecret-1-0
      - name: Create .env (from secret, or empty placeholder)
        run: printf '%s' "${{ secrets.DOTENV }}" > .env
      - run: flutter --version
      - run: flutter pub get
      - run: flutter build linux --release

      - name: Package (tar.gz)
        run: |
          cd build/linux/x64/release/bundle
          tar -czf "$GITHUB_WORKSPACE/Sozo-Linux-x64.tar.gz" .
      - uses: actions/upload-artifact@v4
        with:
          name: Sozo-Linux
          path: Sozo-Linux-x64.tar.gz
          if-no-files-found: error

  # ------------------------------------------------------------------ macOS ----
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Create .env (from secret, or empty placeholder)
        run: printf '%s' "${{ secrets.DOTENV }}" > .env
      - run: flutter --version
      - run: flutter pub get
      - run: flutter build macos --release

      - name: Create unsigned DMG
        run: |
          brew install create-dmg
          APP=$(ls -d build/macos/Build/Products/Release/*.app | head -n1)
          echo "Packaging: $APP"
          create-dmg \
            --volname "Sozo" \
            --window-size 540 380 \
            --icon-size 110 \
            --app-drop-link 380 170 \
            --icon "$(basename "$APP")" 150 170 \
            --no-internet-enable \
            "Sozo-macOS.dmg" "$APP" || \
          create-dmg --volname "Sozo" "Sozo-macOS.dmg" "$APP"
      - uses: actions/upload-artifact@v4
        with:
          name: Sozo-macOS
          path: Sozo-macOS.dmg
          if-no-files-found: error

  # ---------------------------------------------------- Release (on v* tag) ----
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, linux, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
