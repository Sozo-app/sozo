org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# R8 "full mode" (AGP-8 default) applies aggressive, full-program optimizations
# (access modification, devirtualization, assumevalues) that `-keep` does NOT
# suppress. That breaks DexClassLoader-loaded extensions (Aniyomi/manga `.apk`s)
# which bind to host symbols by exact descriptor at runtime — they work in debug
# (R8 off) but silently load no data in release. Compat mode keeps shrinking +
# obfuscation (still governed by proguard-rules.pro) but drops the full-mode
# rewrites, fixing the manga/aniyomi extension load in release.
android.enableR8.fullMode=false
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
