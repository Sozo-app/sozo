<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sozo</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; padding: 0; background: #181818; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  .wrap { min-height: 100dvh; display: grid; place-items: center; padding: 24px; }
  .card { max-width: 420px; width: 100%; text-align: center; }
  .logo { width: 64px; height: 64px; border-radius: 16px; background: #E50914; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 24px; font-size: 28px; font-weight: 800; }
  h1 { margin: 0 0 8px; font-size: 22px; font-weight: 800; }
  p { margin: 0 0 24px; color: #aaa; font-size: 14px; line-height: 1.5; }
  .btn { display: inline-block; padding: 14px 24px; border-radius: 12px; background: #E50914; color: #fff; text-decoration: none; font-weight: 700; font-size: 15px; min-width: 200px; box-sizing: border-box; }
  .btn + .btn { margin-top: 10px; background: #2a2a2a; }
  .stores { margin-top: 20px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .stores a { color: #888; font-size: 13px; text-decoration: underline; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="logo">S</div>
    <h1>Sozo'da oching</h1>
    <p id="msg">Ushbu havola Sozo ilovasida ochiladi. Agar ilova o'rnatilmagan bo'lsa, quyidagi tugma orqali yuklab oling.</p>
    <a class="btn" id="openApp" href="#">Sozo'da ochish</a>
    <div class="stores">
      <a id="playStore" href="https://play.google.com/store/apps/details?id=com.soplay.sozo">Google Play</a>
      <a id="appStore" href="https://apps.apple.com/app/id0000000000">App Store</a>
    </div>
  </div>
</div>
<script>
  (function () {
    var params = new URLSearchParams(location.search);
    var url = params.get('url') || '';
    var path = location.pathname.replace(/^\/+|\/+$/g, '') || 'detail';
    var deepLink = 'sozo://' + path + (url ? '?url=' + encodeURIComponent(url) : '');
    document.getElementById('openApp').href = deepLink;
    setTimeout(function () { location.href = deepLink; }, 50);
  })();
</script>
</body>
</html>
