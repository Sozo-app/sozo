<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" fill="none" role="img" aria-label="Sozo v2 banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b0b0f"/>
      <stop offset="0.55" stop-color="#080809"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <radialGradient id="redGlow" cx="0.5" cy="0.5" r="0.5" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#ff1f2e" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ff1f2e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="redLine" x1="0" y1="0" x2="1200" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff2b39"/>
      <stop offset="1" stop-color="#7a0d14"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#d9d9df"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#1a1216"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="poster" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2030"/>
      <stop offset="1" stop-color="#120c10"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <clipPath id="round"><rect width="1200" height="380" rx="28"/></clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect width="1200" height="380" fill="url(#bg)"/>

    <!-- ambient red glows -->
    <ellipse cx="120" cy="330" rx="320" ry="240" fill="url(#redGlow)" opacity="0.5"/>
    <ellipse cx="1080" cy="80" rx="300" ry="220" fill="url(#redGlow)" opacity="0.35"/>

    <!-- faint poster wall (left back) -->
    <g opacity="0.18">
      <rect x="-10" y="40" width="86" height="120" rx="8" fill="url(#poster)"/>
      <rect x="86" y="80" width="86" height="120" rx="8" fill="url(#poster)"/>
      <rect x="-10" y="172" width="86" height="120" rx="8" fill="url(#poster)"/>
      <rect x="86" y="212" width="86" height="120" rx="8" fill="url(#poster)"/>
      <rect x="182" y="120" width="86" height="120" rx="8" fill="url(#poster)"/>
    </g>

    <!-- signature red wave -->
    <path d="M-40 300 C 260 210, 520 360, 820 250 S 1240 150, 1300 200" stroke="url(#redLine)" stroke-width="6" fill="none" opacity="0.9"/>
    <path d="M-40 300 C 260 210, 520 360, 820 250 S 1240 150, 1300 200" stroke="#ff2b39" stroke-width="22" fill="none" opacity="0.18" filter="url(#soft)"/>

    <!-- phone mockup -->
    <g transform="translate(792 56)">
      <rect x="0" y="0" width="160" height="300" rx="30" fill="#0d0d10" stroke="#26262b" stroke-width="2"/>
      <rect x="9" y="9" width="142" height="282" rx="22" fill="url(#screen)"/>
      <rect x="58" y="18" width="44" height="9" rx="4.5" fill="#000"/>
      <!-- mini app ui -->
      <rect x="20" y="40" width="120" height="70" rx="10" fill="#23131a"/>
      <rect x="20" y="40" width="120" height="70" rx="10" fill="url(#redGlow)" opacity="0.5"/>
      <circle cx="50" cy="132" r="7" fill="#ff2b39"/>
      <rect x="64" y="127" width="70" height="6" rx="3" fill="#2a2a30"/>
      <rect x="20" y="150" width="55" height="78" rx="8" fill="url(#poster)"/>
      <rect x="85" y="150" width="55" height="78" rx="8" fill="url(#poster)"/>
      <rect x="20" y="242" width="120" height="6" rx="3" fill="#1d1d22"/>
      <rect x="20" y="256" width="84" height="6" rx="3" fill="#1d1d22"/>
    </g>

    <!-- film reel mark (right) -->
    <g transform="translate(1075 250)" opacity="0.9">
      <circle r="46" fill="none" stroke="url(#redLine)" stroke-width="6"/>
      <circle r="12" fill="#ff2b39"/>
      <g fill="#ff2b39">
        <circle cx="0" cy="-30" r="6"/>
        <circle cx="26" cy="-15" r="6"/>
        <circle cx="26" cy="15" r="6"/>
        <circle cx="0" cy="30" r="6"/>
        <circle cx="-26" cy="15" r="6"/>
        <circle cx="-26" cy="-15" r="6"/>
      </g>
    </g>

    <!-- text block -->
    <g transform="translate(70 120)">
      <g transform="translate(0 -52)">
        <rect x="0" y="0" width="92" height="34" rx="17" fill="#15151a" stroke="#ff2b39" stroke-opacity="0.55"/>
        <circle cx="20" cy="17" r="5" fill="#ff2b39"/>
        <text x="34" y="22" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#ff5560" letter-spacing="1">v2.0</text>
      </g>
      <text x="0" y="58" font-family="Segoe UI, Arial, sans-serif" font-size="92" font-weight="800" fill="url(#wordmark)" letter-spacing="-2">Sozo</text>
      <text x="4" y="104" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="600" fill="#e7e7ec">Every stream, right in your hands.</text>
      <text x="4" y="138" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="400" fill="#8a8a93">Movies · Series · Anime · Shorts — reimagined for v2.</text>

      <!-- feature chips -->
      <g transform="translate(4 168)" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">
        <g>
          <rect x="0" y="0" width="92" height="30" rx="15" fill="#141418" stroke="#2a2a30"/>
          <text x="46" y="20" text-anchor="middle" fill="#cfcfd6">Downloads</text>
        </g>
        <g transform="translate(102 0)">
          <rect x="0" y="0" width="74" height="30" rx="15" fill="#141418" stroke="#2a2a30"/>
          <text x="37" y="20" text-anchor="middle" fill="#cfcfd6">Shorts</text>
        </g>
        <g transform="translate(186 0)">
          <rect x="0" y="0" width="84" height="30" rx="15" fill="#141418" stroke="#2a2a30"/>
          <text x="42" y="20" text-anchor="middle" fill="#cfcfd6">App Lock</text>
        </g>
        <g transform="translate(280 0)">
          <rect x="0" y="0" width="80" height="30" rx="15" fill="#141418" stroke="#2a2a30"/>
          <text x="40" y="20" text-anchor="middle" fill="#cfcfd6">Streaks</text>
        </g>
      </g>
    </g>

    <rect x="1" y="1" width="1198" height="378" rx="27" fill="none" stroke="#ffffff" stroke-opacity="0.06"/>
  </g>
</svg>
